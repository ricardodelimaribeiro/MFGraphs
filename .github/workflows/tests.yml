---
name: Fast Tests

'on':
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  report_hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check report/history placeholders
        run: |
          set -euo pipefail

          pattern='_TODO_|'
          pattern+='_Describe the code or benchmark configuration change '
          pattern+='being measured in this run\\._|'
          pattern+='_Summarize the main performance signal, regressions, '
          pattern+='or follow-up actions from this run\\._'

          scan_paths=(
            DNF_PERFORMANCE_HISTORY.md
            PARALLEL_PERFORMANCE_HISTORY.md
            History
            Results
          )

          set +e
          if command -v rg >/dev/null 2>&1; then
            rg -n --glob '*.md' "$pattern" "${scan_paths[@]}"
            scan_status=$?
          else
            echo "::notice::ripgrep missing; using grep fallback"
            grep -R -n -E --include='*.md' "$pattern" "${scan_paths[@]}"
            scan_status=$?
          fi
          set -e

          if [ "$scan_status" -eq 0 ]; then
            echo "::error::Found placeholder prose in report/history files"
            exit 1
          fi
          if [ "$scan_status" -ne 1 ]; then
            echo "::error::Placeholder scan failed unexpectedly"
            exit "$scan_status"
          fi

  fast_tests:
    if: >-
      github.event_name != 'pull_request' ||
      !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    environment:
      name: wolfram-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Wolfram environment secrets
        env:
          WOLFRAM_CI_ID: ${{ secrets.WOLFRAM_CI_ID }}
          WOLFRAM_CI_PASS: ${{ secrets.WOLFRAM_CI_PASS }}
        run: |
          if [ -z "$WOLFRAM_CI_ID" ]; then
            echo "::error::Missing WOLFRAM_CI_ID secret"
            exit 1
          fi
          if [ -z "$WOLFRAM_CI_PASS" ]; then
            echo "::error::Missing WOLFRAM_CI_PASS secret"
            exit 1
          fi

      - name: Run Fast Test Suite
        uses: miRoox/wolfram-action@v1
        with:
          file: Scripts/RunTests.wls
          args: fast
        env:
          WOLFRAM_ID: ${{ secrets.WOLFRAM_CI_ID }}
          WOLFRAM_PASS: ${{ secrets.WOLFRAM_CI_PASS }}

  slow_tests:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: wolfram-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Wolfram environment secrets
        env:
          WOLFRAM_CI_ID: ${{ secrets.WOLFRAM_CI_ID }}
          WOLFRAM_CI_PASS: ${{ secrets.WOLFRAM_CI_PASS }}
        run: |
          if [ -z "$WOLFRAM_CI_ID" ]; then
            echo "::error::Missing WOLFRAM_CI_ID secret"
            exit 1
          fi
          if [ -z "$WOLFRAM_CI_PASS" ]; then
            echo "::error::Missing WOLFRAM_CI_PASS secret"
            exit 1
          fi

      - name: Run Slow Test Suite
        uses: miRoox/wolfram-action@v1
        with:
          file: Scripts/RunTests.wls
          args: slow
        env:
          WOLFRAM_ID: ${{ secrets.WOLFRAM_CI_ID }}
          WOLFRAM_PASS: ${{ secrets.WOLFRAM_CI_PASS }}

  benchmark_smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: wolfram-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Wolfram environment secrets
        env:
          WOLFRAM_CI_ID: ${{ secrets.WOLFRAM_CI_ID }}
          WOLFRAM_CI_PASS: ${{ secrets.WOLFRAM_CI_PASS }}
        run: |
          if [ -z "$WOLFRAM_CI_ID" ]; then
            echo "::error::Missing WOLFRAM_CI_ID secret"
            exit 1
          fi
          if [ -z "$WOLFRAM_CI_PASS" ]; then
            echo "::error::Missing WOLFRAM_CI_PASS secret"
            exit 1
          fi

      - name: Run Benchmark Smoke
        uses: miRoox/wolfram-action@v1
        with:
          file: Scripts/BenchmarkSuite.wls
          args: small case=1 timeout=10
        env:
          WOLFRAM_ID: ${{ secrets.WOLFRAM_CI_ID }}
          WOLFRAM_PASS: ${{ secrets.WOLFRAM_CI_PASS }}

  solver_compare_smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: wolfram-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Wolfram environment secrets
        env:
          WOLFRAM_CI_ID: ${{ secrets.WOLFRAM_CI_ID }}
          WOLFRAM_CI_PASS: ${{ secrets.WOLFRAM_CI_PASS }}
        run: |
          if [ -z "$WOLFRAM_CI_ID" ]; then
            echo "::error::Missing WOLFRAM_CI_ID secret"
            exit 1
          fi
          if [ -z "$WOLFRAM_CI_PASS" ]; then
            echo "::error::Missing WOLFRAM_CI_PASS secret"
            exit 1
          fi

      - name: Run Solver Comparison Smoke
        uses: miRoox/wolfram-action@v1
        with:
          file: Scripts/CompareSolvers.wls
          args: smoke
        env:
          WOLFRAM_ID: ${{ secrets.WOLFRAM_CI_ID }}
          WOLFRAM_PASS: ${{ secrets.WOLFRAM_CI_PASS }}
