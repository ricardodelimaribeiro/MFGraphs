name: Fast Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Wolfram Engine
        uses: miRoox/wolfram-action@v1

      - name: Run Fast Test Suite
        run: wolframscript -file Scripts/RunTests.wls fast
